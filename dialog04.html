<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialog ordnen: Всё als Schlusspunkt</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --accent-color: #6c5ce7;
            --success-color: #00b894;
            --error-color: #d63031;
            --text-color: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h1 { font-size: 1.4rem; text-align: center; color: var(--accent-color); }
        .instruction { text-align: center; color: #636e72; margin-bottom: 25px; font-size: 0.95rem; }

        #sortable-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sortable-item {
            background: #fff;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: grab;
            display: flex;
            align-items: center;
            transition: all 0.2s;
            user-select: none;
        }

        .sortable-item:active { cursor: grabbing; }
        .sortable-item.dragging { opacity: 0.5; background: #f1f2f6; }

        .number-badge {
            background: #dfe6e9;
            color: #636e72;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .feedback-area {
            text-align: center;
            margin: 20px 0;
            min-height: 24px;
            font-weight: bold;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-check { background: var(--accent-color); color: white; }
        .btn-solution { background: #0984e3; color: white; }
        .btn-restart { background: #b2bec3; color: white; }
        button:hover { opacity: 0.9; }

        .item-correct { border-color: var(--success-color); background: #e8f8f5; }
        .item-wrong { border-color: var(--error-color); background: #fff5f5; }

        @media (max-width: 480px) {
            .sortable-item { font-size: 0.9rem; padding: 10px; }
            button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bringe den Dialog in Ordnung</h1>
    <p class="instruction">Verschiebe die Sätze per Drag-and-Drop. Der Dialog endet logisch mit dem Wort „Всё“.</p>

    <div id="sortable-list"></div>

    <div class="feedback-area" id="feedback"></div>

    <div class="controls">
        <button class="btn-check" onclick="checkOrder()">Prüfen</button>
        <button class="btn-solution" onclick="showSolution()">Lösung</button>
        <button class="btn-restart" onclick="initGame()">Neustart</button>
    </div>
</div>

<script>
    const correctOrder = [
        "Почему ты опять опоздал?",
        "У меня было много работы.",
        "Это не оправдание, мы договаривались!",
        "Я не хочу сейчас об этом спорить.",
        "Но мы должны это обсудить!",
        "Всё, я больше не хочу разговаривать."
    ];

    function initGame() {
        const listEl = document.getElementById('sortable-list');
        const feedbackEl = document.getElementById('feedback');
        feedbackEl.innerText = "";
        listEl.innerHTML = "";
        
        let items = [...correctOrder].sort(() => Math.random() - 0.5);

        items.forEach((text) => {
            createItem(text, listEl);
        });

        addDragListeners(listEl);
    }

    function createItem(text, container) {
        const li = document.createElement('div');
        li.className = 'sortable-item';
        li.draggable = true;
        li.dataset.text = text;
        li.innerHTML = `<span class="number-badge"></span> <span>${text}</span>`;
        
        li.addEventListener('dragstart', () => li.classList.add('dragging'));
        li.addEventListener('dragend', () => li.classList.remove('dragging'));
        
        container.appendChild(li);
        updateBadges();
    }

    function addDragListeners(container) {
        container.addEventListener('dragover', e => {
            e.preventDefault();
            const afterElement = getDragAfterElement(container, e.clientY);
            const draggable = document.querySelector('.dragging');
            if (draggable) {
                if (afterElement == null) {
                    container.appendChild(draggable);
                } else {
                    container.insertBefore(draggable, afterElement);
                }
                updateBadges();
            }
        });
    }

    function getDragAfterElement(container, y) {
        const draggableElements = [...container.querySelectorAll('.sortable-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    function updateBadges() {
        document.querySelectorAll('.number-badge').forEach((badge, idx) => {
            badge.innerText = idx + 1;
        });
    }

    function checkOrder() {
        const currentItems = document.querySelectorAll('.sortable-item');
        let correctCount = 0;
        currentItems.forEach((item, idx) => {
            item.classList.remove('item-correct', 'item-wrong');
            if (item.dataset.text === correctOrder[idx]) {
                item.classList.add('item-correct');
                correctCount++;
            } else {
                item.classList.add('item-wrong');
            }
        });

        const feedbackEl = document.getElementById('feedback');
        if (correctCount === correctOrder.length) {
            feedbackEl.innerText = "Hervorragend! Alles in der richtigen Reihenfolge.";
            feedbackEl.style.color = "var(--success-color)";
        } else {
            feedbackEl.innerText = "Einige Sätze liegen noch falsch.";
            feedbackEl.style.color = "var(--error-color)";
        }
    }

    function showSolution() {
        const listEl = document.getElementById('sortable-list');
        listEl.innerHTML = "";
        correctOrder.forEach(text => {
            const li = document.createElement('div');
            li.className = 'sortable-item item-correct';
            li.dataset.text = text;
            li.innerHTML = `<span class="number-badge"></span> <span>${text}</span>`;
            listEl.appendChild(li);
        });
        updateBadges();
        document.getElementById('feedback').innerText = "Hier ist die korrekte Reihenfolge.";
        document.getElementById('feedback').style.color = "var(--accent-color)";
    }

    initGame();
</script>

</body>
</html>
