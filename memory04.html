<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory: Russische Stoppsignale</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-back: #4a69bd;
            --card-front: #ffffff;
            --success-color: #27ae60;
            --text-dark: #2f3640;
            --text-light: #ffffff;
            --border-ui: #dcdde1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        h1 { color: var(--text-dark); margin-bottom: 25px; }

        .grid {
            display: grid;
            /* Flexiblere Spalten für bessere horizontale Lesbarkeit */
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (min-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (min-width: 800px) {
            .grid { grid-template-columns: repeat(4, 1fr); }
        }

        .card {
            /* Rechteckiges Format statt Quadrat für bessere Textdarstellung */
            height: 80px;
            background-color: var(--card-back);
            border: 2px solid var(--card-back);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-light);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 10px;
            /* Text-Ausrichtung explizit von links nach rechts */
            direction: ltr; 
            text-align: center;
            user-select: none;
        }

        /* Verdeckte Karte */
        .card:not(.flipped) span {
            display: none;
        }
        
        .card:not(.flipped)::after {
            content: "?";
            font-size: 1.8rem;
            color: rgba(255,255,255,0.4);
        }

        .card.flipped {
            background-color: var(--card-front);
            color: var(--text-dark);
            transform: rotateX(0deg); /* Verzicht auf 3D-Drehung für bessere Lesbarkeit */
            border-color: var(--card-back);
        }
        
        .card.flipped span {
            display: block;
        }
        
        .card.flipped::after {
            content: "";
        }

        /* Sanftes Verschwinden */
        .card.matched {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
            transition: opacity 1s ease, transform 1s ease;
        }

        .controls {
            margin-top: 30px;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            background: var(--card-back);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 10px rgba(74, 105, 189, 0.3);
        }

        button:hover { background: #3c56a5; }

        .message {
            margin-top: 20px;
            font-weight: bold;
            color: var(--success-color);
            min-height: 30px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Paare finden</h1>
    <div class="grid" id="gameGrid"></div>
    <div class="message" id="message"></div>
    <div class="controls">
        <button onclick="initGame()">Spiel neu starten</button>
    </div>
</div>

<script>
    const pairs = [
        { ru: "всё", de: "Schluss jetzt" },
        { ru: "хватит", de: "Es reicht" },
        { ru: "стоп", de: "Stopp" },
        { ru: "замолчи", de: "Schweig still" },
        { ru: "я ухожу", de: "Ich gehe" },
        { ru: "перестань", de: "Hör auf" }
    ];

    let flippedCards = [];
    let matchedCount = 0;
    let isLock = false;

    function initGame() {
        const grid = document.getElementById('gameGrid');
        const message = document.getElementById('message');
        grid.innerHTML = '';
        message.innerText = '';
        matchedCount = 0;
        flippedCards = [];
        isLock = false;

        let cardsData = [];
        pairs.forEach((p, index) => {
            cardsData.push({ text: p.ru, pairId: index });
            cardsData.push({ text: p.de, pairId: index });
        });

        cardsData.sort(() => Math.random() - 0.5);

        cardsData.forEach(data => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.pairId = data.pairId;
            
            const span = document.createElement('span');
            span.innerText = data.text;
            card.appendChild(span);
            
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });
    }

    function flipCard(card) {
        if (isLock || card.classList.contains('flipped') || card.classList.contains('matched')) return;

        card.classList.add('flipped');
        flippedCards.push(card);

        if (flippedCards.length === 2) {
            checkMatch();
        }
    }

    function checkMatch() {
        isLock = true;
        const [card1, card2] = flippedCards;
        const isMatch = card1.dataset.pairId === card2.dataset.pairId;

        if (isMatch) {
            setTimeout(() => {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedCount++;
                flippedCards = [];
                isLock = false;
                if (matchedCount === pairs.length) {
                    document.getElementById('message').innerText = "Hervorragend! Alle Paare gefunden.";
                }
            }, 800); 
        } else {
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                flippedCards = [];
                isLock = false;
            }, 1200);
        }
    }

    initGame();
</script>

</body>
</html>
